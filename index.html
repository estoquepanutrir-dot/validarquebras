<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Conferência de Quebras</title>
<meta name="theme-color" content="#1A3770">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231A3770'/%3E%3Cpath d='M12 22l4-6h32l4 6H12z' fill='%23ffffff' opacity='.3'/%3E%3Crect x='10' y='22' width='44' height='30' rx='3' fill='%23ffffff' opacity='.15'/%3E%3Crect x='10' y='22' width='44' height='30' rx='3' fill='none' stroke='%23ffffff' stroke-width='2.5'/%3E%3Cpath d='M12 22l4-6h32l4 6' fill='none' stroke='%23ffffff' stroke-width='2.5' stroke-linejoin='round'/%3E%3Cpath d='M24 22v4a8 8 0 0016 0v-4' fill='none' stroke='%2334C759' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231A3770'/%3E%3Cpath d='M12 22l4-6h32l4 6H12z' fill='%23ffffff' opacity='.3'/%3E%3Crect x='10' y='22' width='44' height='30' rx='3' fill='%23ffffff' opacity='.15'/%3E%3Crect x='10' y='22' width='44' height='30' rx='3' fill='none' stroke='%23ffffff' stroke-width='2.5'/%3E%3Cpath d='M12 22l4-6h32l4 6' fill='none' stroke='%23ffffff' stroke-width='2.5' stroke-linejoin='round'/%3E%3Cpath d='M24 22v4a8 8 0 0016 0v-4' fill='none' stroke='%2334C759' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Quebras">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ── Reset & Base ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#1A3770;
  --blue-mid:#2B4E9E;
  --accent:#5856D6;
  --green:#34C759;
  --red:#FF3B30;
  --orange:#FF9500;
  --yellow:#FFCC00;
  --bg:#F0F2F7;
  --surface:#fff;
  --surface2:#F5F6FA;
  --border:#E2E5ED;
  --text:#1C1C1E;
  --text2:#636366;
  --text3:#AEAEB2;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 16px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.07);
  --shadow-lg:0 10px 40px rgba(0,0,0,.18),0 4px 12px rgba(0,0,0,.10);
  --radius:14px;
  --radius-sm:9px;
  --radius-lg:20px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);padding-bottom:80px;color:var(--text)}

/* ── Header Fluent ── */
.hdr{
  position:sticky;top:0;z-index:100;
  background:rgba(26,55,112,0.96);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  color:#fff;
  padding:0 14px;
  height:52px;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 1px 0 rgba(255,255,255,0.1),0 2px 12px rgba(0,0,0,.25);
}
.hdr-title{font-size:14px;font-weight:800;letter-spacing:.03em;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-count{font-size:10px;opacity:.7;white-space:nowrap;flex-shrink:0}
.hdr-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* Botões do header — compactos para mobile */
.hdr-btn{
  display:flex;align-items:center;justify-content:center;
  height:32px;
  border:none;border-radius:8px;
  font-size:11px;font-weight:700;cursor:pointer;
  white-space:nowrap;transition:all .15s ease;
  padding:0 10px;gap:4px;
}
.hdr-btn:active{transform:scale(.93);opacity:.85}
.hdr-btn-icon{width:32px;padding:0}
.hdr-btn-pdf{background:var(--green);color:#fff}
.hdr-btn-import{background:rgba(255,255,255,0.16);color:#fff;border:1px solid rgba(255,255,255,.2)}
.hdr-btn-user{background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,.15)}

/* ── Sync dot ── */
.sync-dot{
  width:8px;height:8px;border-radius:50%;
  background:#8E8E93;flex-shrink:0;cursor:pointer;
  transition:background .3s;
  box-shadow:0 0 0 2px rgba(255,255,255,.3);
}
.sync-dot:active{transform:scale(.8)}

/* ── Progress bar ── */
.pbar-bg{position:sticky;top:52px;z-index:99;background:rgba(0,0,0,.12);height:3px}
.pbar{height:3px;background:linear-gradient(90deg,var(--green),#2EE87A);transition:width .4s cubic-bezier(.4,0,.2,1);width:0}

/* ── Search bar ── */
.search-bar{
  position:sticky;top:55px;z-index:97;
  background:rgba(240,242,247,0.95);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  padding:8px 12px;
  display:flex;gap:6px;align-items:center;
  border-bottom:1px solid var(--border);
}
.search-inp{
  flex:1;min-width:0;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:9px 12px;font-size:13px;font-family:inherit;
  color:var(--text);background:var(--surface);outline:none;
  -webkit-appearance:none;transition:border-color .15s,box-shadow .15s;
}
.search-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(88,86,214,.12)}
.search-inp::placeholder{color:var(--text3)}

.btn-srch-clr{
  height:36px;padding:0 10px;
  background:var(--surface2);color:var(--text2);
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;
  transition:all .12s;flex-shrink:0;
}
.btn-srch-clr:active{opacity:.7}
.sum-btn{
  height:36px;padding:0 10px;
  background:var(--accent);color:#fff;
  border:none;border-radius:var(--radius-sm);
  font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;gap:3px;
  transition:all .12s;flex-shrink:0;
}
.sum-btn.active{background:var(--orange)}
.sum-btn:active{opacity:.8}

/* ── Validated panel ── */
.validated-panel{
  margin:10px 12px 0;
  background:var(--surface);
  border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
  overflow:hidden;
  border:1px solid var(--border);
}
.validated-toggle{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:11px 14px;background:none;border:none;cursor:pointer;
  text-align:left;transition:background .12s;
}
.validated-toggle:active{background:var(--surface2)}
.validated-toggle-icon{
  width:22px;height:22px;border-radius:50%;
  background:linear-gradient(135deg,var(--green),#2EE87A);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:12px;font-weight:900;flex-shrink:0;
  box-shadow:0 2px 6px rgba(52,199,89,.35);
}
.validated-toggle-label{font-size:13px;font-weight:700;color:var(--text);flex:1}
.validated-toggle-count{
  font-size:11px;font-weight:700;
  background:var(--green);color:#fff;
  padding:2px 9px;border-radius:20px;
}
.validated-toggle-arrow{
  font-size:10px;color:var(--text3);
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  flex-shrink:0;
}
.validated-toggle-arrow.open{transform:rotate(180deg)}
.validated-body{
  max-height:0;overflow:hidden;
  transition:max-height .3s cubic-bezier(.4,0,.2,1);
}
.validated-body.open{max-height:4000px}
.validated-inner{border-top:1px solid var(--border);padding:8px 10px;display:flex;flex-direction:column;gap:6px}

/* mini-card para validadas */
.mini-card{
  display:flex;align-items:center;gap:10px;
  padding:9px 11px;
  background:var(--surface2);border-radius:10px;
  border:1px solid var(--border);
}
.mini-etq{font-size:12px;font-weight:800;color:var(--blue);background:#EEF2FF;padding:3px 8px;border-radius:6px}
.mini-nome{font-size:11px;color:var(--text2);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.mini-st{font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;white-space:nowrap;text-transform:uppercase}
.mini-st.pres{background:#E8FBF0;color:#1A7A3A}
.mini-st.ause{background:#FFEBEA;color:#C0251C}
.mini-st.corr{background:#FFF3E0;color:#9C5A00}
.mini-undo{
  width:28px;height:28px;flex-shrink:0;
  background:var(--border);color:var(--text2);
  border:none;border-radius:7px;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;
}
.mini-undo:active{background:#E5E5EA;transform:scale(.9)}

/* ── Cards area ── */
.cards{padding:10px 12px;display:flex;flex-direction:column;gap:10px}
.card{
  background:var(--surface);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow-sm);
  border:1px solid var(--border);
  transition:box-shadow .2s;
  position:relative;
}
.card.fant{border-left:4px solid var(--orange);background:#FFFCF5}
.card.selecionado{box-shadow:0 0 0 2.5px var(--accent),var(--shadow-sm)}

/* Card header */
.chdr{
  display:flex;align-items:center;
  padding:10px 12px 8px;
  border-bottom:1px solid var(--surface2);
  gap:8px;
}
.chdr-left{display:flex;align-items:center;flex-wrap:wrap;gap:5px;flex:1;min-width:0}
.etq-a{
  font-size:13px;font-weight:800;color:var(--blue);
  text-decoration:none;background:#EEF2FF;
  padding:3px 9px;border-radius:7px;letter-spacing:.02em;
  white-space:nowrap;
}
.etq-a:hover{background:#DDE5FF}
.etq-s{font-size:13px;font-weight:800;color:var(--text2);background:var(--surface2);padding:3px 9px;border-radius:7px;white-space:nowrap}
.ftag{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;color:#92480A;background:#FFF0CC;padding:2px 7px;border-radius:6px}
.chdr-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.card-sel-mark{display:none;align-items:center;justify-content:center;width:20px;height:20px;background:var(--accent);color:#fff;border-radius:50%;font-size:10px;font-weight:900;flex-shrink:0}
.card.selecionado .card-sel-mark{display:flex}
.bdg{font-size:9px;font-weight:800;padding:3px 9px;border-radius:8px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}

/* Card body */
.cbdy{padding:10px 12px 12px}
.nome{font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.4}
.meta-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.meta-date{font-size:10px;color:var(--text3);font-weight:500}
.meta-nums{display:flex;gap:14px}
.qlbl{font-size:8px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.qval{font-size:15px;font-weight:800;color:var(--text)}

/* Action buttons — 3 colunas, tap-friendly */
.sgrp{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:2px}
.sbtn{
  padding:11px 4px;
  border:1.5px solid var(--border);border-radius:10px;
  background:var(--surface);
  font-size:10px;font-weight:800;color:var(--text2);
  cursor:pointer;text-align:center;
  transition:all .13s ease;min-height:42px;
  -webkit-tap-highlight-color:transparent;
  line-height:1.3;
}
.sbtn:active{transform:scale(.95)}
.sbtn.pres.on{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 3px 8px rgba(52,199,89,.3)}
.sbtn.ause.on{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 3px 8px rgba(255,59,48,.3)}
.sbtn.corr.on{background:var(--orange);border-color:var(--orange);color:#fff;box-shadow:0 3px 8px rgba(255,149,0,.3)}

.obs-inp{
  margin-top:8px;width:100%;
  border:1.5px solid var(--border);border-radius:8px;
  padding:8px 10px;font-size:12px;font-family:inherit;
  color:var(--text);outline:none;background:var(--surface2);
}
.obs-inp:focus{border-color:var(--orange);background:var(--surface)}

/* "by" info */
.by-info{display:flex;align-items:center;gap:5px;margin-top:8px;padding:6px 10px;border-radius:8px;font-size:10px;font-weight:600}
.by-info.by-outros{background:#EEF2FF;color:var(--accent)}
.by-info.by-eu{background:var(--surface2);color:var(--text2)}
.by-info b{font-weight:900}

/* SKU separator */
.sku-sep{
  border-radius:10px;display:flex;align-items:center;justify-content:space-between;
  gap:8px;margin-top:2px;padding:8px 12px;
}
.sku-sep:first-child{margin-top:0}
.sku-sep-nome{font-size:11px;font-weight:800;letter-spacing:.02em;line-height:1.3;flex:1;color:#fff}
.sku-sep-cnt{font-size:9px;font-weight:700;background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:8px;white-space:nowrap;color:#fff}

/* ── Empty / loading states ── */
.no-res{text-align:center;padding:40px 20px;color:var(--text2);font-size:13px;font-weight:600}

/* ── Modals ── */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(15,15,30,0.55);z-index:200;
  align-items:center;justify-content:center;padding:16px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.modal-bg.show{display:flex}
.modal{
  background:var(--surface);border-radius:var(--radius-lg);
  max-width:420px;width:100%;max-height:88vh;overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:var(--shadow-lg);
  border:1px solid rgba(255,255,255,.8);
}
.modal-hdr{
  padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.modal-hdr h2{font-size:14px;font-weight:800;letter-spacing:.02em;color:var(--text)}
.modal-close{
  background:var(--surface2);color:var(--text2);border:none;
  width:28px;height:28px;border-radius:50%;
  font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;
}
.modal-close:active{transform:scale(.88)}
.modal-body{padding:14px 16px;overflow-y:auto;flex:1}

/* Sum modal specific */
.sum-total-bg{
  background:linear-gradient(135deg,var(--accent),#7B79E0);
  color:#fff;border-radius:14px;padding:14px;margin-bottom:12px;text-align:center;
}
.sum-total-lb{font-size:9px;font-weight:700;opacity:.8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.sum-total-vl{font-size:26px;font-weight:900;letter-spacing:-.02em}
.sum-total-sub{font-size:11px;opacity:.85;margin-top:3px;font-weight:600}
.sum-grp{background:var(--surface2);border-radius:11px;padding:12px;margin-bottom:8px}
.sum-grp-nm{font-size:11px;font-weight:800;color:var(--blue);margin-bottom:6px;line-height:1.3}
.sum-grp-info{font-size:10px;color:var(--text2);margin-bottom:6px;font-weight:600}
.sum-grp-res{display:flex;gap:10px;align-items:center;background:var(--surface);border-radius:8px;padding:9px 11px}
.sum-grp-res-it{flex:1;text-align:center}
.sum-grp-res-it.div{border-left:1px solid var(--border);border-right:1px solid var(--border)}
.sum-grp-res-lb{font-size:8px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.sum-grp-res-vl{font-size:17px;font-weight:900;color:var(--text);margin-top:1px}
.sum-grp-res-vl.cx{color:var(--accent)}
.sum-grp-res-vl.un{color:var(--orange)}
.sum-grp-etqs{font-size:9px;color:var(--text3);margin-top:6px;font-style:italic;line-height:1.4}
.sum-empty{text-align:center;padding:30px 10px;color:var(--text2);font-size:13px}

/* ── Splash / user modal ── */
.modal-user-btn{
  width:100%;padding:14px;border:none;border-radius:12px;
  font-size:14px;font-weight:800;cursor:pointer;
  transition:all .13s;letter-spacing:.01em;
}
.modal-user-btn:active{transform:scale(.97)}
.modal-user-btn-main{background:var(--blue);color:#fff}
.modal-user-btn-sec{background:var(--accent);color:#fff}

/* ── Import button ── */
.btn-reimport{background:rgba(255,255,255,0.16);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:0 10px;height:32px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}

/* ── Fluent elevation helper ── */
.fluent-card{
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
}

@media(prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important}
}
</style>
</head>
<body>

<div id="app" style="display:none">
  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-title">Conferência de Quebras</div>
    <span id="ptxt" class="hdr-count">0/0</span>
    <div class="hdr-actions">
      <span id="syncDot" class="sync-dot" title="Sincronizado" onclick="forcarSync()"></span>
      <button class="hdr-btn hdr-btn-pdf" onclick="gerarPDF()" title="Gerar PDF">📄 PDF</button>
      <button id="btnImport" class="hdr-btn hdr-btn-import" onclick="reimportar()" title="Importar planilha" style="display:none">📂</button>
      <button id="btnNome" onclick="mudarNome()" class="hdr-btn hdr-btn-user">👤</button>
    </div>
  </div>

  <!-- PROGRESS BAR -->
  <div class="pbar-bg"><div class="pbar" id="pbar"></div></div>

  <!-- SEARCH + TOOLS BAR -->
  <div class="search-bar">
    <input id="srch" class="search-inp" type="text" placeholder="🔍  Buscar etiqueta ou SKU..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    <button id="srchClr" class="btn-srch-clr" onclick="limparBusca()">Limpar</button>
    <button id="sumBtn" class="sum-btn" onclick="toggleSomaModo()">Σ Somar</button>
  </div>

  <!-- VALIDATED PANEL (accordion) -->
  <div id="validatedPanel" class="validated-panel" style="display:none">
    <button class="validated-toggle" onclick="toggleValidated()">
      <div class="validated-toggle-icon">✓</div>
      <span class="validated-toggle-label">Validadas</span>
      <span id="validatedCount" class="validated-toggle-count">0</span>
      <span id="validatedArrow" class="validated-toggle-arrow">▼</span>
    </button>
    <div id="validatedBody" class="validated-body">
      <div id="validatedInner" class="validated-inner"></div>
    </div>
  </div>

  <!-- MAIN CARDS -->
  <div class="cards" id="cards"></div>
</div>

<!-- FILE INPUT -->
<input type="file" id="fileInputGlobal" accept=".xlsx,.xls,.csv" style="display:none" onchange="processarArquivo(this.files[0])"/>

<!-- MODAL: Soma/Totalizador -->
<div id="sumModal" class="modal-bg" onclick="if(event.target===this)fecharSomaModal()">
  <div class="modal">
    <div class="modal-hdr">
      <h2>Σ Totalizador por Caixas</h2>
      <button class="modal-close" onclick="fecharSomaModal()">×</button>
    </div>
    <div id="sumModalBdy" class="modal-body"></div>
  </div>
</div>

<!-- MODAL: Seleção de usuário -->
<div id="nomeModal" style="display:none;position:fixed;inset:0;background:rgba(15,15,30,0.6);z-index:300;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(10px)">
  <div style="background:#fff;border-radius:20px;padding:22px;max-width:340px;width:100%;display:flex;flex-direction:column;gap:10px;box-shadow:0 20px 60px rgba(0,0,0,.25)">
    <div style="font-size:17px;font-weight:900;color:var(--blue);text-align:center;margin-bottom:2px">Quem é você?</div>
    <button onclick="selecionarUsuario('Cosme')" class="modal-user-btn modal-user-btn-main">👑 Cosme (Admin)</button>
    <button onclick="selecionarUsuario('Anderson')" class="modal-user-btn modal-user-btn-sec">📋 Anderson</button>
    <div style="font-size:11px;color:var(--text3);text-align:center;margin:2px 0">ou entre como convidado:</div>
    <div style="display:flex;gap:8px">
      <input id="nomeInput" placeholder="Seu nome..." style="flex:1;border:1.5px solid var(--border);border-radius:10px;padding:11px;font-size:13px;outline:none" onkeydown="if(event.key==='Enter')selecionarUsuario(this.value)"/>
      <button onclick="selecionarUsuario(document.getElementById('nomeInput').value)" style="padding:11px 16px;border:none;border-radius:10px;background:var(--green);color:#fff;font-size:13px;font-weight:800;cursor:pointer">OK</button>
    </div>
  </div>
</div>

<!-- MODAL: Senha Admin -->
<div id="senhaModal" style="display:none;position:fixed;inset:0;background:rgba(15,15,30,0.6);z-index:310;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(10px)">
  <div style="background:#fff;border-radius:20px;padding:22px;max-width:320px;width:100%;display:flex;flex-direction:column;gap:12px;box-shadow:0 20px 60px rgba(0,0,0,.25)">
    <div style="font-size:15px;font-weight:900;color:var(--blue);text-align:center">🔒 Senha do Admin</div>
    <div style="font-size:12px;color:var(--text2);text-align:center;line-height:1.4">Digite a senha para liberar a importação de planilhas.</div>
    <input id="senhaInput" type="password" placeholder="Senha..." style="border:1.5px solid var(--border);border-radius:10px;padding:12px;font-size:14px;text-align:center;outline:none" onkeydown="if(event.key==='Enter')confirmarSenhaAdmin()"/>
    <div style="display:flex;gap:8px">
      <button onclick="fecharSenhaModal()" style="flex:1;padding:12px;border:none;border-radius:10px;background:var(--surface2);color:var(--text);font-size:13px;font-weight:800;cursor:pointer">Só conferir</button>
      <button onclick="confirmarSenhaAdmin()" style="flex:1;padding:12px;border:none;border-radius:10px;background:var(--blue);color:#fff;font-size:13px;font-weight:800;cursor:pointer">Entrar</button>
    </div>
    <div id="senhaErro" style="display:none;font-size:11px;color:var(--red);text-align:center;font-weight:700">Senha incorreta.</div>
  </div>
</div>

<script>
var dados = [];
var ME = '';
var isAdmin = false;
var _validatedOpen = false;

// ── Validated panel toggle ──
function toggleValidated(){
  _validatedOpen = !_validatedOpen;
  var body = document.getElementById('validatedBody');
  var arrow = document.getElementById('validatedArrow');
  if(body) body.classList.toggle('open', _validatedOpen);
  if(arrow) arrow.classList.toggle('open', _validatedOpen);
}

// ── Gerenciamento de usuário ──
function selecionarUsuario(nome){
  nome = (nome || '').trim();
  if(!nome){ alert('Digite um nome para continuar.'); return; }
  var m = document.getElementById('nomeModal');
  if(m) m.style.display = 'none';

  if(nome === 'Cosme'){
    var sm = document.getElementById('senhaModal');
    if(sm){ sm.style.display = 'flex'; setTimeout(function(){ var si=document.getElementById('senhaInput'); if(si)si.focus(); },100); }
    window._nomeAdmin = nome;
  } else {
    _aplicarUsuario(nome, false);
  }
}

function confirmarSenhaAdmin(){
  var inp = document.getElementById('senhaInput');
  var err = document.getElementById('senhaErro');
  var senha = inp ? inp.value : '';
  if(senha === 'panutrir2024' || senha === 'admin'){
    if(err) err.style.display = 'none';
    var sm = document.getElementById('senhaModal');
    if(sm) sm.style.display = 'none';
    if(inp) inp.value = '';
    _aplicarUsuario(window._nomeAdmin || 'Cosme', true);
  } else {
    if(err) err.style.display = 'block';
  }
}

function fecharSenhaModal(){
  var sm = document.getElementById('senhaModal');
  if(sm) sm.style.display = 'none';
  var inp = document.getElementById('senhaInput');
  if(inp) inp.value = '';
  var err = document.getElementById('senhaErro');
  if(err) err.style.display = 'none';
  _aplicarUsuario(window._nomeAdmin || 'Cosme', false);
}

function _aplicarUsuario(nome, admin){
  ME = nome;
  isAdmin = admin;
  try{ localStorage.setItem('estoquista_nome', nome); }catch(e){}
  try{ localStorage.setItem('is_admin', admin ? '1' : '0'); }catch(e){}
  var bn = document.getElementById('btnNome');
  if(bn) bn.textContent = (isAdmin ? '👑' : '👤') + ' ' + ME;
  var bi = document.getElementById('btnImport');
  if(bi) bi.style.display = isAdmin ? 'inline-flex' : 'none';
  render(); prog();
  setTimeout(function(){
    try{ iniciarSync(); }catch(e){}
    setSyncStatus(navigator.onLine ? 'idle' : 'offline');
    _iniciarPollDados();
  }, 500);
}

function mudarNome(){
  try{ localStorage.removeItem('estoquista_nome'); }catch(e){}
  try{ localStorage.removeItem('is_admin'); }catch(e){}
  ME = ''; isAdmin = false;
  var m = document.getElementById('nomeModal');
  if(m){ m.style.display = 'flex'; }
  var bi = document.getElementById('btnImport');
  if(bi) bi.style.display = 'none';
}

// ── Indicador visual de sincronização ──
function setSyncStatus(status){
  var dot = document.getElementById('syncDot');
  if(!dot) return;
  var cores = { idle:'#34C759', pushing:'#FF9500', pulling:'#007AFF', offline:'#8E8E93', error:'#FF3B30' };
  var titulos = { idle:'Sincronizado', pushing:'Enviando...', pulling:'Recebendo...', offline:'Sem conexão', error:'Erro de sincronização' };
  dot.style.background = cores[status] || '#8E8E93';
  dot.title = titulos[status] || status;
}

function _dataKey(d){ var dt=d||new Date(); return String(dt.getDate()).padStart(2,'0')+String(dt.getMonth()+1).padStart(2,'0')+dt.getFullYear(); }
var SK = 'conf_q_' + _dataKey();
var E = {};
try { E = JSON.parse(localStorage.getItem(SK) || '{}'); } catch(e) {}
var filtroAtual = '';
var modoSoma = false;
var somaSel = {};

// ═══════════════════════════════════════════════════════════════
// FIREBASE REALTIME DATABASE
// ═══════════════════════════════════════════════════════════════
var FB_URL = 'https://validaquebra-default-rtdb.firebaseio.com';
var POLL_MS = 5000;
var PUSH_DEBOUNCE_MS = 1500;

function _fbDadosURL(){ return FB_URL + '/dados_' + _dataKey() + '.json'; }
function _fbConfURL(){  return FB_URL + '/conf_'  + _dataKey() + '.json'; }

var pushTimer = null;
var pullTimer = null;
var _syncBusy = false;
var ultimaMudancaRemota = {};

function cloudPush(){
  if(!navigator.onLine){ setSyncStatus('offline'); return; }
  if(_syncBusy){ cloudPushDebounced(); return; }
  _syncBusy = true;
  setSyncStatus('pushing');
  var guard = setTimeout(function(){ _syncBusy = false; setSyncStatus('error'); }, 15000);

  fetch(_fbConfURL())
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(remoto){
      if(remoto && typeof remoto === 'object'){
        for(var k in remoto){
          var rem = remoto[k], loc = E[k];
          if(!rem || typeof rem !== 'object') continue;
          if((rem.ts||0) > ((loc&&loc.ts)||0)){ E[k] = rem; ultimaMudancaRemota[k] = Date.now(); }
        }
      }
      return fetch(_fbConfURL(), {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(E)
      });
    })
    .then(function(r){
      if(!r.ok) throw new Error('HTTP ' + r.status);
      try{ localStorage.setItem(SK, JSON.stringify(E)); }catch(e){}
      render(); prog();
      clearTimeout(guard); _syncBusy = false; setSyncStatus('idle');
    })
    .catch(function(e){
      console.warn('[cloudPush]', e);
      clearTimeout(guard); _syncBusy = false; setSyncStatus('error');
    });
}

function cloudPushDebounced(){
  if(pushTimer) clearTimeout(pushTimer);
  pushTimer = setTimeout(cloudPush, PUSH_DEBOUNCE_MS);
}

function cloudPull(){
  if(!navigator.onLine){ setSyncStatus('offline'); return; }
  if(_syncBusy) return;
  _syncBusy = true;
  setSyncStatus('pulling');
  var guard = setTimeout(function(){ _syncBusy = false; setSyncStatus('error'); }, 15000);

  fetch(_fbConfURL())
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(remoto){
      if(remoto && typeof remoto === 'object'){
        var mudou = false;
        for(var k in remoto){
          var rem = remoto[k], loc = E[k];
          if(!rem || typeof rem !== 'object') continue;
          if((rem.ts||0) > ((loc&&loc.ts)||0)){
            E[k] = rem; ultimaMudancaRemota[k] = Date.now(); mudou = true;
          }
        }
        if(mudou){ try{ localStorage.setItem(SK, JSON.stringify(E)); }catch(e){} render(); prog(); }
      }
      clearTimeout(guard); _syncBusy = false; setSyncStatus('idle');
    })
    .catch(function(){ clearTimeout(guard); _syncBusy = false; setSyncStatus('error'); });
}

function iniciarSync(){
  cloudPush();
  if(pullTimer) clearInterval(pullTimer);
  pullTimer = setInterval(cloudPush, POLL_MS);
}

function forcarSync(){ cloudPush(); }

function pushDados(tentativa){
  tentativa = tentativa || 1;
  if(!navigator.onLine || !dados || dados.length === 0) return;
  console.log('[pushDados] tentativa', tentativa, '| itens:', dados.length);

  fetch(_fbDadosURL(), {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({dados: dados, ts: Date.now()})
  })
  .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(function(){
    console.log('[pushDados] OK');
    setSyncStatus('idle');
    alert('✅ Planilha enviada para a nuvem!\n' + dados.length + ' quebras disponíveis para outros usuários.');
  })
  .catch(function(e){
    console.warn('[pushDados] erro tentativa', tentativa, e);
    if(tentativa < 4){
      setTimeout(function(){ pushDados(tentativa+1); }, tentativa * 2000);
    } else {
      alert('⚠️ Não foi possível enviar a planilha. Verifique a conexão e tente reimportar.');
      setSyncStatus('error');
    }
  });
}

var _pollDadosTimer = null;
function _iniciarPollDados(){
  if(_pollDadosTimer) clearInterval(_pollDadosTimer);
  if(dados.length > 0) return;
  _pollDadosTimer = setInterval(function(){
    if(dados.length > 0){ clearInterval(_pollDadosTimer); _pollDadosTimer = null; return; }
    fetch(_fbDadosURL())
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(d){
        if(d && d.dados && Array.isArray(d.dados) && d.dados.length > 0){
          dados = d.dados.map(function(it){
            return Object.assign({},it,{_val:it._val?Number(it._val):Infinity});
          });
          clearInterval(_pollDadosTimer); _pollDadosTimer = null;
          render(); prog();
          console.log('[pollDados] recebidos:', dados.length, 'itens');
        }
      })
      .catch(function(){});
  }, 4000);
}

function iniciarConferencia(){
  document.getElementById('app').style.display = 'block';
  render(); prog();
  setTimeout(function(){
    try{ iniciarSync(); }catch(e){}
    setSyncStatus(navigator.onLine ? 'idle' : 'offline');
    _iniciarPollDados();
    if(!navigator.onLine) return;
    Promise.all([
      fetch(_fbDadosURL()).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; }),
      fetch(_fbConfURL()).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; })
    ]).then(function(res){
      var remDados = res[0], remConf = res[1], mudou = false;
      if(remDados && remDados.dados && Array.isArray(remDados.dados) && remDados.dados.length > 0){
        dados = remDados.dados.map(function(it){
          return Object.assign({},it,{_val:it._val?Number(it._val):Infinity});
        });
        mudou = true;
      }
      if(remConf && typeof remConf === 'object'){
        for(var k in remConf){
          var rem = remConf[k], loc = E[k];
          if(!rem || typeof rem !== 'object') continue;
          if((rem.ts||0) > ((loc&&loc.ts)||0)){ E[k] = rem; mudou = true; }
        }
        try{ localStorage.setItem(SK, JSON.stringify(E)); }catch(e){}
      }
      if(mudou){ render(); prog(); }
    }).catch(function(e){ console.warn('[iniciarConferencia bg]', e); });
  }, 500);
}

setInterval(function(){
  var novoSK = 'conf_q_' + _dataKey();
  if(novoSK !== SK){
    SK = novoSK; E = {};
    try{ localStorage.setItem(SK,'{}'); }catch(e){}
    if(pullTimer) clearInterval(pullTimer);
    pullTimer = setInterval(cloudPush, POLL_MS);
    render(); prog();
  }
}, 60000);

// ── Helpers de data/cor ──
function sc(d) {
  try {
    var p=d.split('/'),dd=+p[0],mm=+p[1],aa=+p[2];
    var df=Math.floor((new Date(aa,mm-1,dd)-new Date())/86400000);
    if(df<0)  return{bg:'#1C1C1E',tx:'#fff',lb:'VENCIDO'};
    if(df<10) return{bg:'#8B4513',tx:'#fff',lb:'PRAZO LIM.'};
    if(df<=19)return{bg:'#FF3B30',tx:'#fff',lb:'URGENTE'};
    if(df<=21)return{bg:'#FF9500',tx:'#fff',lb:'CRÍTICO'};
    if(df<=23)return{bg:'#FFCC00',tx:'#2D1F00',lb:'ATENÇÃO'};
    return    {bg:'#E5E5EA',tx:'#1C1C1E',lb:'NORMAL'};
  }catch(e){return{bg:'#E5E5EA',tx:'#1C1C1E',lb:''};}
}

function salvar(key,campo,v){
  if(!E[key])E[key]={};
  E[key][campo]=v;
  E[key].ts=Date.now();
  E[key].by=ME||'?';
  try{localStorage.setItem(SK,JSON.stringify(E));}catch(e){}
  prog();
  cloudPushDebounced();
}

function setSt(i,st){
  var item = dados[i];
  if(!item) return;
  var key = item.k;
  var est = E[key] || {};
  var stAtual = est.status || '';

  if (stAtual && stAtual !== st) {
    var labels = { pres: 'PRESENTE', ause: 'AUSENTE', corr: 'CORRIGIDA' };
    var labelAtual = labels[stAtual] || stAtual;
    var labelNovo  = labels[st] || st;
    var msg;
    if (est.by && est.by !== ME) {
      var tempoAtras = est.ts ? tempoRelativo(est.ts) : 'pouco tempo';
      msg = 'Esse item foi marcado como ' + labelAtual + '\npor ' + est.by + ' (há ' + tempoAtras + ').\n\nDeseja alterar para ' + labelNovo + '?';
    } else {
      msg = 'Esse item já consta como ' + labelAtual + '.\n\nDeseja alterar para ' + labelNovo + '?';
    }
    if (!confirm(msg)) { return; }
  }

  salvar(key,'status',st);
  // Marca como validada → re-render move o card para a aba
  render();
}

// Desfaz validação de um item (chamado pelo botão ↩ na aba validadas)
function desfazerValidacao(key){
  if(E[key]){
    delete E[key].status;
    E[key].ts = Date.now();
    E[key].by = ME||'?';
    try{localStorage.setItem(SK,JSON.stringify(E));}catch(e){}
    prog();
    cloudPushDebounced();
    render();
  }
}

function tempoRelativo(ts){
  var s = Math.floor((Date.now() - ts) / 1000);
  if(s < 60)   return s + ' s';
  var m = Math.floor(s / 60);
  if(m < 60)   return m + ' min';
  var h = Math.floor(m / 60);
  if(h < 24)   return h + ' h';
  var d = Math.floor(h / 24);
  return d + ' dia' + (d > 1 ? 's' : '');
}

function prog(){
  var m=0;
  for(var k in E){if(E[k]&&E[k].status)m++;}
  var t=dados.length;
  var el=document.getElementById('ptxt');
  if(el)el.textContent=m+'/'+t;
  var pb=document.getElementById('pbar');
  if(pb)pb.style.width=(t?(m/t*100):0)+'%';
}

var _corSkuCache={};
function corDoSku(cod){
  var key=String(cod||'0');
  if(_corSkuCache[key])return _corSkuCache[key];
  var h=0;
  for(var x=0;x<key.length;x++){h=((h<<5)-h)+key.charCodeAt(x);h|=0;}
  var hue=Math.abs(h*47)%360;
  var light='hsl('+hue+',55%,94%)';
  var dark ='hsl('+hue+',42%,36%)';
  var res={light:light,dark:dark,hue:hue};
  _corSkuCache[key]=res;
  return res;
}

function limparBusca(){
  filtroAtual='';
  var si=document.getElementById('srch');
  if(si)si.value='';
  render();
}

function toggleSomaModo(){
  if(!modoSoma){
    modoSoma=true;
    var btn=document.getElementById('sumBtn');
    if(btn){btn.classList.add('active');btn.innerHTML='Σ Ver total ('+Object.keys(somaSel).length+')';}
    alert('Modo SOMA ativado. Toque nas etiquetas que deseja somar. Quando terminar, toque novamente em "Ver total".');
  } else {
    if(Object.keys(somaSel).length===0){
      modoSoma=false;
      somaSel={};
      var btn0=document.getElementById('sumBtn');
      if(btn0){btn0.classList.remove('active');btn0.innerHTML='Σ Somar';}
      render();
      return;
    }
    abrirSomaModal();
  }
}

function atualizarBtnSoma(){
  var btn=document.getElementById('sumBtn');
  if(btn && modoSoma){
    btn.innerHTML='Σ Ver total ('+Object.keys(somaSel).length+')';
  }
}

function abrirSomaModal(){
  var bdy=document.getElementById('sumModalBdy');
  if(!bdy)return;
  var sel=[];
  for(var k in somaSel){if(somaSel[k]){sel.push(dados[parseInt(k)]);}}
  if(sel.length===0){
    bdy.innerHTML='<div class="sum-empty">Nenhuma etiqueta selecionada.<br>Volte e toque nas etiquetas que deseja somar.</div>';
    document.getElementById('sumModal').classList.add('show');
    return;
  }
  var grupos={};
  sel.forEach(function(it){
    var cod=it._cod;
    if(!grupos[cod])grupos[cod]={nome:it.nome,upCx:it.upCx,totalUnd:0,etiquetas:[]};
    grupos[cod].totalUnd+=it.total;
    grupos[cod].etiquetas.push(it.etiqueta);
  });
  var totalGeralUnd=0,html='';
  var chaves=Object.keys(grupos);
  chaves.forEach(function(cod){
    var g=grupos[cod];
    totalGeralUnd+=g.totalUnd;
    var cxsT=Math.floor(g.totalUnd/g.upCx);
    var undT=Math.round(g.totalUnd%g.upCx);
    var lastroFmt=Number.isInteger(g.upCx)?g.upCx:g.upCx.toFixed(2);
    html+='<div class="sum-grp">'+
          '<div class="sum-grp-nm">'+g.nome+'</div>'+
          '<div class="sum-grp-info">'+g.etiquetas.length+(g.etiquetas.length===1?' etiqueta':' etiquetas')+' &middot; lastro: '+lastroFmt+' un/cx</div>'+
          '<div class="sum-grp-res">'+
          '<div class="sum-grp-res-it"><div class="sum-grp-res-lb">TOTAL</div><div class="sum-grp-res-vl">'+g.totalUnd+'</div></div>'+
          '<div class="sum-grp-res-it div"><div class="sum-grp-res-lb">CAIXAS</div><div class="sum-grp-res-vl cx">'+cxsT+'</div></div>'+
          '<div class="sum-grp-res-it"><div class="sum-grp-res-lb">UNDS SOLTAS</div><div class="sum-grp-res-vl un">'+undT+'</div></div>'+
          '</div>'+
          '<div class="sum-grp-etqs">Etiquetas: '+g.etiquetas.join(', ')+'</div>'+
          '</div>';
  });
  var headerHtml='<div class="sum-total-bg">'+
                 '<div class="sum-total-lb">Total Geral (Unidades)</div>'+
                 '<div class="sum-total-vl">'+totalGeralUnd+'</div>'+
                 '<div class="sum-total-sub">'+sel.length+(sel.length===1?' etiqueta':' etiquetas')+' &middot; '+chaves.length+(chaves.length===1?' SKU':' SKUs')+'</div>'+
                 '</div>';
  var footerHtml='<div style="display:flex;gap:8px;margin-top:8px">'+
                 '<button onclick="limparSelecao()" style="flex:1;padding:11px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:800;cursor:pointer">Limpar seleção</button>'+
                 '<button onclick="fecharSomaModal()" style="flex:1;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:800;cursor:pointer">Fechar</button>'+
                 '</div>';
  bdy.innerHTML=headerHtml+html+footerHtml;
  document.getElementById('sumModal').classList.add('show');
}

function fecharSomaModal(){
  var m=document.getElementById('sumModal');
  if(m)m.classList.remove('show');
}

function limparSelecao(){
  somaSel={};
  modoSoma=false;
  var btn=document.getElementById('sumBtn');
  if(btn){btn.classList.remove('active');btn.innerHTML='Σ Somar';}
  fecharSomaModal();
  render();
}

// ── RENDER PRINCIPAL ──
function render(){
  var cont=document.getElementById('cards');
  if(!cont)return;
  var termo=(filtroAtual||'').toLowerCase().trim();

  // Separar validadas (com status) das pendentes
  var pendentes=[];
  var validadas=[];
  for(var i=0;i<dados.length;i++){
    var it=dados[i];
    var est=E[it.k]||{};
    var matchFiltro=true;
    if(termo){
      var etq=String(it.etiqueta||'').toLowerCase();
      var cod=String(it._cod||'').toLowerCase();
      var nm=String(it.nome||'').toLowerCase();
      if(etq.indexOf(termo)===-1 && cod.indexOf(termo)===-1 && nm.indexOf(termo)===-1) matchFiltro=false;
    }
    if(est.status){
      // Item validado — só aparece na aba, não nas cards (a menos que tenha filtro ativo buscando por ele)
      validadas.push({item:it,idx:i,est:est});
    } else {
      if(matchFiltro) pendentes.push({item:it,idx:i,est:est});
    }
  }

  // ── Renderizar painel de validadas ──
  var panel=document.getElementById('validatedPanel');
  var inner=document.getElementById('validatedInner');
  var countEl=document.getElementById('validatedCount');
  if(validadas.length>0){
    if(panel) panel.style.display='block';
    if(countEl) countEl.textContent=validadas.length;
    if(inner){
      var vh='';
      var stLabels={pres:'PRESENTE',ause:'AUSENTE',corr:'CORRIGIDA'};
      validadas.forEach(function(reg){
        var it=reg.item;
        var est=reg.est;
        var stLb=stLabels[est.status]||est.status;
        var stCls=est.status||'';
        var hasL=it.etiqueta&&it.etiqueta!=='-';
        vh+='<div class="mini-card">'+
            (hasL?'<span class="mini-etq">'+it.etiqueta+'</span>':'<span class="mini-etq" style="color:var(--text2)">'+it.etiqueta+'</span>')+

function gerarPDF(){
  if(!window.jspdf){alert('Aguarde o carregamento do PDF.');return;}
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});

  var pgH=doc.internal.pageSize.getHeight();
  var hoje=new Date().toLocaleDateString('pt-BR');
  var np=0,na=0,nc=0;
  for(var k in E){if(!E[k])continue;if(E[k].status==='pres')np++;else if(E[k].status==='ause')na++;else if(E[k].status==='corr')nc++;}
  var nn=dados.length-np-na-nc;

  var dadosFiltrados=[];
  for(var idx=0; idx<dados.length; idx++){
    var estF=E[dados[idx].k]||{};
    if(estF.status==='ause' || estF.status==='corr'){
      dadosFiltrados.push({item:dados[idx], idx:idx, est:estF});
    }
  }
  if(dadosFiltrados.length===0){
    alert('Nenhuma etiqueta marcada como AUSENTE ou CORRIGIDA. Faça a conferência antes de gerar o PDF.');
    return;
  }

  doc.setFillColor(88,86,214);doc.rect(0,0,pgW,1.5,'F');
  doc.setFillColor(250,250,253);doc.rect(0,1.5,pgW,28,'F');
  doc.setDrawColor(235,235,242);doc.setLineWidth(0.3);doc.line(0,29.5,pgW,29.5);
  doc.setFont('helvetica','bold');doc.setFontSize(17);doc.setTextColor(28,28,30);
  doc.text('Quebras: Ausentes & Correções',10,14);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(108,108,112);
  doc.text('Apenas etiquetas ausentes e observações de correção — CD Matriz Panutrir',10,20);
  doc.text('Gerado em: '+hoje,10,26);

  var kpiY=33,kpiH=16,kpiW=(pgW-20)/4;
  var kpis=[
    {lb:'AUSENTE',vl:na,c:[255,59,48]},
    {lb:'CORRIGIDA',vl:nc,c:[255,149,0]},
    {lb:'PRESENTE',vl:np,c:[52,199,89]},
    {lb:'N. CONFERIDO',vl:nn,c:[108,108,112]}
  ];
  kpis.forEach(function(ki,j){
    var x=10+j*kpiW;
    doc.setFillColor(242,242,247);doc.roundedRect(x,kpiY,kpiW-3,kpiH,2,2,'F');
    doc.setFillColor(ki.c[0],ki.c[1],ki.c[2]);doc.rect(x,kpiY,2,kpiH,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(28,28,30);
    doc.text(String(ki.vl),x+(kpiW-3)/2,kpiY+9.5,{align:'center'});
    doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(108,108,112);
    doc.text(ki.lb,x+(kpiW-3)/2,kpiY+14,{align:'center'});
  });

  var y=kpiY+kpiH+6;
  var cols=[
    {h:'ETIQUETA / STATUS',w:46,a:'left'},{h:'PRODUTO',w:68,a:'left'},
    {h:'VENCIMENTO',w:26,a:'center'},{h:'CX',w:12,a:'center'},
    {h:'UNDS',w:14,a:'center'},{h:'TOTAL',w:16,a:'center'}
  ];
  var xC=9;
  doc.setFillColor(28,28,30);doc.rect(xC,y,pgW-18,6.5,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(6);doc.setTextColor(255,255,255);
  var cx2=xC;
  cols.forEach(function(c){
    var tx=c.a==='center'?cx2+c.w/2:cx2+2;
    doc.text(c.h,tx,y+4.3,{align:c.a==='center'?'center':'left'});
    cx2+=c.w;
  });
  y+=6.5;

  var maxY=pgH-14;
  var pageNum=1;
  function drawFoot2(){
    doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(150,150,160);
    doc.text('Pág '+pageNum,pgW/2,pgH-5,{align:'center'});
    doc.text('Quebras: Ausentes & Correções — '+hoje+' — CD Matriz Panutrir',pgW/2,pgH-9,{align:'center'});
  }

  var stMap={'pres':{lb:'PRESENTE',c:[52,199,89]},'ause':{lb:'AUSENTE',c:[255,59,48]},'corr':{lb:'CORRIGIDA',c:[255,149,0]}};
  dadosFiltrados.forEach(function(reg,rowIdx){
    var item=reg.item;
    var est=reg.est;
    if(y+8>maxY){drawFoot2();doc.addPage();pageNum++;y=14;}
    var alt=rowIdx%2===0;
    var rfill=alt?[250,250,253]:[255,255,255];
    doc.setFillColor(rfill[0],rfill[1],rfill[2]);doc.rect(xC,y,pgW-18,8,'F');

    var stInfo=est.status&&stMap[est.status]?stMap[est.status]:{lb:'—',c:[200,200,200]};
    doc.setFillColor(stInfo.c[0],stInfo.c[1],stInfo.c[2]);doc.rect(xC,y,2.5,8,'F');

    var cx3=xC+3;
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(26,55,112);
    doc.text(item.etiqueta,cx3+1,y+5);
    var stBadgeX=cx3+19;
    doc.setFillColor(stInfo.c[0],stInfo.c[1],stInfo.c[2]);doc.roundedRect(stBadgeX,y+1.6,22,4.8,1.2,1.2,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(6);doc.setTextColor(255,255,255);
    doc.text(stInfo.lb,stBadgeX+11,y+4.8,{align:'center'});
    cx3+=43;

    var nomeT=item.nome.length>40?item.nome.substring(0,39)+'…':item.nome;
    doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(28,28,30);
    doc.text(nomeT,cx3+2,y+5);cx3+=68;

    var sp=function(dataStr){
      try{var p=dataStr.split('/'),df=Math.floor((new Date(+p[2],+p[1]-1,+p[0])-new Date())/86400000);
        if(df<0)  return{bg:[28,28,30],tx:[255,255,255],lb:'VENCIDO'};
        if(df<10) return{bg:[139,69,19],tx:[255,255,255],lb:'PRAZO LIM.'};
        if(df<=19)return{bg:[255,59,48],tx:[255,255,255],lb:'URGENTE'};
        if(df<=21)return{bg:[255,149,0],tx:[255,255,255],lb:'CRITICO'};
        if(df<=23)return{bg:[255,204,0],tx:[45,31,0],lb:'ATENCAO'};
        return    {bg:[229,229,234],tx:[28,28,30],lb:'NORMAL'};}
      catch(e){return{bg:[229,229,234],tx:[28,28,30],lb:''};} };
    var sp2=sp(item.data);
    doc.setFillColor(sp2.bg[0],sp2.bg[1],sp2.bg[2]);doc.roundedRect(cx3+1,y+1.5,24,5,1,1,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(5.5);doc.setTextColor(sp2.tx[0],sp2.tx[1],sp2.tx[2]);
    doc.text(item.data,cx3+13,y+4.2,{align:'center'});cx3+=26;

    doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(28,28,30);
    doc.text(String(item.cx),cx3+12/2,y+5,{align:'center'});cx3+=12;
    doc.text(String(item.unds),cx3+14/2,y+5,{align:'center'});cx3+=14;
    doc.text(String(item.total),cx3+16/2,y+5,{align:'center'});cx3+=16;

    if(item.obs){
      doc.setFont('helvetica','bold');doc.setFontSize(5);doc.setTextColor(160,100,0);
      doc.text('FANTASMA?',xC+pgW-26,y+5);
    }
    if(est.obs){
      y+=8;
      if(y+5>maxY){drawFoot2();doc.addPage();pageNum++;y=14;}
      doc.setFillColor(255,249,235);doc.rect(xC,y,pgW-18,5,'F');
      doc.setFont('helvetica','italic');doc.setFontSize(6);doc.setTextColor(130,80,0);
      var obsT=('OBS: '+est.obs);if(obsT.length>90)obsT=obsT.substring(0,89)+'…';
      doc.text(obsT,xC+4,y+3.5);
      y+=5;
    } else { y+=8; }

    doc.setDrawColor(242,242,247);doc.setLineWidth(0.2);doc.line(xC,y,xC+pgW-18,y);
  });

  drawFoot2();
  var dt=new Date().toISOString().slice(0,10).replace(/-/g,'');
  doc.save('Quebras_Ausentes_Correcoes_'+dt+'.pdf');
}

function _nText(v){return String(v==null?'':v).normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().toUpperCase();}
function _nKey(v){return _nText(v).replace(/[^A-Z0-9]+/g,'_').replace(/^_+|_+$/g,'');}
function _pNum(v){if(typeof v==='number')return v;var s=String(v==null?'':v).trim().replace(/\s/g,'');if(s.indexOf('.')>=0&&s.indexOf(',')>=0)s=s.replace(/\./g,'').replace(',','.');else s=s.replace(',','.');return isNaN(Number(s))?0:Number(s);}
function _pDate(v){if(!v&&v!==0)return null;if(v instanceof Date&&!isNaN(v)){var d=new Date(v);d.setHours(0,0,0,0);return d;}if(typeof v==='number')return new Date(Math.floor(v-25569)*86400*1000);var s=String(v).trim();if(s.indexOf('/')>=0){var p=s.split('/');if(p.length===3)return new Date(Number(p[2]),Number(p[1])-1,Number(p[0]));}return null;}
function _gField(row,al){for(var i=0;i<al.length;i++){var a=al[i];if(row[a]!==undefined&&row[a]!==null&&String(row[a]).trim()!=='')return row[a];}return '';}
function _gLastro(cod,name){var s=String(cod).trim();if(lastroSkuDB[s])return lastroSkuDB[s];return _nText(name).indexOf('HAMBURGUER GOURMET')>=0?136:190;}

function processarArquivo(file){
  if(!file)return;
  if(typeof XLSX==='undefined'){alert('Biblioteca de planilha ainda carregando. Aguarde e tente de novo.');return;}
  var reader=new FileReader();
  reader.onload=function(evt){
    try{
      var wb=XLSX.read(new Uint8Array(evt.target.result),{type:'array',cellDates:true});
      var rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      montarQuebras(rows,file.name);
    }catch(e){alert('Erro ao ler planilha: '+e.message);}
  };
  reader.readAsArrayBuffer(file);
}

function montarQuebras(rows,fileName){
  var today=new Date();today.setHours(0,0,0,0);
  var listaQ=[];
  rows.forEach(function(row){
    var n={};Object.keys(row||{}).forEach(function(k){n[_nKey(k)]=row[k];});
    var cod=String(_gField(n,['COD','CODIGO','SKU'])).trim().replace(/\.0+$/,'').replace(/\s/g,'');
    var produto=String(_gField(n,['PRODUTO','DESCRICAO','ITEM'])).trim();
    var qtd=Math.round(_pNum(_gField(n,['QTD_TOTAL','QTD','ESTOQUE'])));
    var validade=_pDate(_gField(n,['VALIDADE','DT_VALIDADE']));
    var etiqueta=String(_gField(n,['ETIQUETA'])).trim();
    if(!produto||!validade||!qtd)return;
    var lastro=_gLastro(cod,produto);
    if(qtd>=lastro)return;
    var diff=Math.ceil((validade-today)/86400000);
    listaQ.push({cod:cod,produto:produto,qtd:qtd,validade:validade,lastro:lastro,etiqueta:etiqueta,diff:diff});
  });
  if(listaQ.length===0){alert('A planilha foi lida, mas nenhuma quebra (qtd < lastro) foi encontrada.\nVerifique as colunas: COD, PRODUTO, QTD_TOTAL, VALIDADE, ETIQUETA.');return;}

  var minDiff=Math.min.apply(null,listaQ.map(function(i){return i.diff;}));
  var _ordem=[81571,81591,162396,16,81581,11,145521,145511,655,1224,6,69251,82051,2,81661,85841,162800,162767,85181,162802,135231,135221,135211,162275,135241,162276,162923,162920,162921,162922,121801,121581,121811,121831,121821,121861,121871,162358,121841,162783,162784,669,162775,162272,141951,141441];
  dados=listaQ.map(function(i){
    var div=i.produto.toUpperCase().indexOf('HAMBURGUER')>=0?17:19;
    var upCx=i.lastro/div;
    var etq=String(i.etiqueta||i.cod||'-');
    var valStr=i.validade?i.validade.toISOString().slice(0,10):'0';
    var k=(etq+'|'+i.cod+'|'+valStr+'|'+Math.round(i.qtd)).replace(/\s+/g,'_');
    return {
      k:k, etiqueta:etq, _cod:i.cod,
      _val:i.validade?i.validade.getTime():Infinity,
      data:i.validade?i.validade.toLocaleDateString('pt-BR'):'-',
      nome:i.produto,
      cx:Math.floor(i.qtd/upCx), unds:Math.round(i.qtd%upCx), total:Math.round(i.qtd),
      upCx:upCx,
      obs:(i.qtd<30&&i.diff===minDiff)?'FANTASMA?':''
    };
  }).sort(function(a,b){
    var ia=_ordem.indexOf(Number(a._cod)),ib=_ordem.indexOf(Number(b._cod));
    var pA=ia===-1?Infinity:ia,pB=ib===-1?Infinity:ib;
    if(pA!==pB)return pA-pB;
    if(a._cod!==b._cod)return String(a._cod).localeCompare(String(b._cod));
    return a._val-b._val;
  });

  render();
  setSyncStatus(navigator.onLine?'idle':'offline');
  pushDados();
  setTimeout(pushDados, 3000);
}

function reimportar(){
  var fi=document.getElementById('fileInputGlobal');
  if(fi){fi.value='';fi.click();}
}
</script>
