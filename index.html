<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Conferência de Quebras</title>
<meta name="theme-color" content="#1A3770">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F2F2F7;padding-bottom:90px}
.hdr{position:sticky;top:0;z-index:100;background:#1A3770;color:#fff;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.hdr h1{font-size:13px;font-weight:800;letter-spacing:.03em;flex:1;white-space:nowrap}
.ptxt{font-size:10px;opacity:.75;white-space:nowrap}
.btn-pdf{background:#34C759;color:#fff;border:none;border-radius:9px;padding:8px 13px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap}
.btn-pdf:active{opacity:.75}
.pbar-bg{position:sticky;top:49px;z-index:99;background:#D1D1D6;height:3px}
.pbar{height:3px;background:#34C759;transition:width .3s;width:0}
.cards{padding:10px 12px;display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.10)}
.card.fant{border-left:4px solid #FF9500;background:#FFFBEB}
.chdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px 9px;border-bottom:1px solid #F2F2F7;gap:8px}
.etq-a{font-size:14px;font-weight:800;color:#1A3770;text-decoration:none;background:#EEF2FF;padding:4px 10px;border-radius:8px;letter-spacing:.02em}
.etq-s{font-size:14px;font-weight:800;color:#8E8E93;background:#F2F2F7;padding:4px 10px;border-radius:8px}
.bdg{font-size:10px;font-weight:800;padding:4px 10px;border-radius:10px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.cbdy{padding:11px 14px 14px}
.nome{font-size:13px;font-weight:600;color:#1C1C1E;margin-bottom:9px;line-height:1.4}
.qlbl{font-size:9px;font-weight:700;color:#8E8E93;text-transform:uppercase;letter-spacing:.05em}
.qval{font-size:16px;font-weight:800;color:#1C1C1E}
.sgrp{display:flex;gap:6px;margin-top:4px}
.sbtn{flex:1;padding:13px 2px;border:2px solid #E5E5EA;border-radius:12px;background:#fff;font-size:11px;font-weight:800;color:#8E8E93;cursor:pointer;text-align:center;transition:all .12s;min-height:46px;-webkit-tap-highlight-color:transparent}
.sbtn.pres.on{background:#34C759;border-color:#34C759;color:#fff}
.sbtn.ause.on{background:#FF3B30;border-color:#FF3B30;color:#fff}
.sbtn.corr.on{background:#FF9500;border-color:#FF9500;color:#fff}
.obs-inp{margin-top:8px;width:100%;border:1.5px solid #E5E5EA;border-radius:8px;padding:7px 10px;font-size:12px;font-family:inherit;color:#1C1C1E;outline:none}
.obs-inp:focus{border-color:#FF9500}
.ftag{display:inline-block;font-size:9px;font-weight:700;color:#92480A;background:#FFF0CC;padding:2px 7px;border-radius:8px;margin-left:5px;vertical-align:middle}
.sku-sep{background:#1A3770;color:#fff;padding:9px 13px;border-radius:11px;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:4px}
.sku-sep:first-child{margin-top:0}
.sku-sep-nome{font-size:11px;font-weight:800;letter-spacing:.02em;line-height:1.3;flex:1}
.sku-sep-cnt{font-size:9px;font-weight:700;background:rgba(255,255,255,0.18);padding:2px 8px;border-radius:8px;white-space:nowrap}
.search-bar{position:sticky;top:52px;z-index:97;background:#F2F2F7;padding:9px 11px 7px;display:flex;gap:7px;align-items:center;border-bottom:1px solid #E5E5EA}
.search-inp{flex:1;border:1.5px solid #D1D1D6;border-radius:10px;padding:9px 12px;font-size:13px;font-family:inherit;color:#1C1C1E;background:#fff;outline:none;-webkit-appearance:none}
.search-inp:focus{border-color:#1A3770;box-shadow:0 0 0 3px rgba(26,55,112,0.12)}
.search-clr{background:#E5E5EA;color:#1C1C1E;border:none;border-radius:9px;padding:9px 11px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap}
.search-clr:active{opacity:.7}
.sum-btn{background:#5856D6;color:#fff;border:none;border-radius:9px;padding:9px 11px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px}
.sum-btn.active{background:#FF9500}
.sum-btn:active{opacity:.8}
.no-res{text-align:center;padding:40px 20px;color:#8E8E93;font-size:13px;font-weight:600}
.card.selecionado{box-shadow:0 0 0 3px #5856D6,0 1px 3px rgba(0,0,0,.09)}
.card-sel-mark{display:none;align-items:center;justify-content:center;width:22px;height:22px;background:#5856D6;color:#fff;border-radius:50%;font-size:11px;font-weight:900;flex-shrink:0}
.card.selecionado .card-sel-mark{display:flex}
.sum-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(2px)}
.sum-modal-bg.show{display:flex}
.sum-modal{background:#fff;border-radius:18px;max-width:420px;width:100%;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 10px 40px rgba(0,0,0,0.3)}
.sum-modal-hdr{background:#5856D6;color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.sum-modal-hdr h2{font-size:14px;font-weight:800;letter-spacing:.02em}
.sum-modal-close{background:rgba(255,255,255,0.18);color:#fff;border:none;width:28px;height:28px;border-radius:50%;font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sum-modal-bdy{padding:14px 18px;overflow-y:auto;flex:1}
.sum-total-bg{background:linear-gradient(135deg,#5856D6,#7B79E0);color:#fff;border-radius:14px;padding:14px;margin-bottom:14px;text-align:center}
.sum-total-lb{font-size:9px;font-weight:700;opacity:.8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.sum-total-vl{font-size:26px;font-weight:900;letter-spacing:-.02em}
.sum-total-sub{font-size:11px;opacity:.85;margin-top:3px;font-weight:600}
.sum-grp{background:#F2F2F7;border-radius:11px;padding:12px;margin-bottom:9px}
.sum-grp-nm{font-size:11px;font-weight:800;color:#1A3770;margin-bottom:8px;line-height:1.3}
.sum-grp-info{font-size:10px;color:#8E8E93;margin-bottom:7px;font-weight:600}
.sum-grp-res{display:flex;gap:10px;align-items:center;background:#fff;border-radius:8px;padding:9px 11px}
.sum-grp-res-it{flex:1;text-align:center}
.sum-grp-res-it.div{border-left:1px solid #E5E5EA;border-right:1px solid #E5E5EA}
.sum-grp-res-lb{font-size:8px;font-weight:700;color:#8E8E93;text-transform:uppercase;letter-spacing:.05em}
.sum-grp-res-vl{font-size:17px;font-weight:900;color:#1C1C1E;margin-top:1px}
.sum-grp-res-vl.cx{color:#5856D6}
.sum-grp-res-vl.un{color:#FF9500}
.sum-grp-etqs{font-size:9px;color:#8E8E93;margin-top:7px;font-style:italic;line-height:1.4}
.sum-empty{text-align:center;padding:30px 10px;color:#8E8E93;font-size:13px}
.sync-dot{display:inline-block;width:11px;height:11px;border-radius:50%;background:#8E8E93;margin-left:6px;cursor:pointer;transition:background .25s;box-shadow:0 0 0 2px rgba(255,255,255,0.4)}
.sync-dot:active{transform:scale(.85)}
.by-info{display:flex;align-items:center;gap:5px;margin-top:10px;padding:7px 10px;border-radius:9px;font-size:11px;font-weight:600}
.by-info.by-outros{background:#EEF2FF;color:#5856D6}
.by-info.by-eu{background:#F2F2F7;color:#636366}
.by-info b{font-weight:900}
.card{position:relative}
/* ── Tela de importação (splash) ── */
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:30px;text-align:center;background:#F2F2F7}
.splash-ic{font-size:54px;margin-bottom:16px}
.splash-tit{font-size:19px;font-weight:900;color:#1A3770;margin-bottom:8px}
.splash-sub{font-size:13px;color:#6C6C70;line-height:1.55;max-width:330px;margin-bottom:22px}
.btn-import{background:#1A3770;color:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.02em}
.btn-import:active{transform:scale(.97)}
.btn-reimport{background:#5856D6;color:#fff;border:none;border-radius:9px;padding:8px 12px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap}
.splash-spin{width:34px;height:34px;border:3px solid #E5E5EA;border-top-color:#1A3770;border-radius:50%;animation:_spin .8s linear infinite;margin:6px auto 0}
@keyframes _spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<!-- SPLASH: tela inicial mostra o seletor de usuário, não a importação direta -->
<div id="splash" style="display:none"></div>

<div id="app" style="display:none">
  <div class="hdr">
    <h1>Conferência de Quebras</h1>
    <span id="ptxt" class="ptxt">0/0 conferidos</span>
    <span id="syncDot" class="sync-dot" title="Sincronizado" onclick="forcarSync()"></span>
    <button class="btn-pdf" onclick="gerarPDF()">📷 PDF</button>
    <!-- Botão de importar: só aparece para o Admin (Cosme) autenticado -->
    <button id="btnImport" class="btn-reimport" onclick="reimportar()" title="Importar planilha (Admin)" style="display:none">📂</button>
    <button id="btnNome" onclick="mudarNome()" style="background:rgba(255,255,255,0.18);color:#fff;border:none;border-radius:9px;padding:6px 11px;font-size:10px;font-weight:800;cursor:pointer;white-space:nowrap;letter-spacing:.02em">👤</button>
  </div>
  <div class="pbar-bg"><div class="pbar" id="pbar"></div></div>
  <div class="search-bar">
    <input id="srch" class="search-inp" type="text" placeholder="Buscar por etiqueta ou SKU..." autocomplete="off"/>
    <button id="srchClr" class="search-clr" onclick="limparBusca()">Limpar</button>
    <button id="sumBtn" class="sum-btn" onclick="toggleSomaModo()">&#931; Somar</button>
  </div>
  <div class="cards" id="cards"></div>
</div>

<input type="file" id="fileInputGlobal" accept=".xlsx,.xls,.csv" style="display:none" onchange="processarArquivo(this.files[0])"/>

<div id="sumModal" class="sum-modal-bg" onclick="if(event.target===this)fecharSomaModal()">
  <div class="sum-modal">
    <div class="sum-modal-hdr"><h2>&#931; Totalizador por Caixas</h2><button class="sum-modal-close" onclick="fecharSomaModal()">&times;</button></div>
    <div id="sumModalBdy" class="sum-modal-bdy"></div>
  </div>
</div>

<!-- MODAL: seleção de usuário -->
<div id="nomeModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(4px)">
  <div style="background:#fff;border-radius:16px;padding:22px;max-width:340px;width:100%;display:flex;flex-direction:column;gap:11px">
    <div style="font-size:16px;font-weight:900;color:#1A3770;text-align:center;margin-bottom:2px">Quem é você?</div>
    <button onclick="selecionarUsuario('Cosme')" style="padding:14px;border:none;border-radius:12px;background:#1A3770;color:#fff;font-size:15px;font-weight:800;cursor:pointer">👑 Cosme (Admin)</button>
    <button onclick="selecionarUsuario('Anderson')" style="padding:14px;border:none;border-radius:12px;background:#5856D6;color:#fff;font-size:15px;font-weight:800;cursor:pointer">📋 Anderson</button>
    <div style="font-size:11px;color:#8E8E93;text-align:center;margin:2px 0">ou entre como convidado:</div>
    <div style="display:flex;gap:8px">
      <input id="nomeInput" placeholder="Seu nome..." style="flex:1;border:1.5px solid #D1D1D6;border-radius:10px;padding:11px;font-size:13px" onkeydown="if(event.key==='Enter')selecionarUsuario(this.value)"/>
      <button onclick="selecionarUsuario(document.getElementById('nomeInput').value)" style="padding:12px 18px;border:none;border-radius:10px;background:#34C759;color:#fff;font-size:13px;font-weight:800;cursor:pointer">OK</button>
    </div>
  </div>
</div>

<!-- MODAL: senha do Admin -->
<div id="senhaModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:310;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(4px)">
  <div style="background:#fff;border-radius:16px;padding:22px;max-width:320px;width:100%;display:flex;flex-direction:column;gap:12px">
    <div style="font-size:15px;font-weight:900;color:#1A3770;text-align:center">🔒 Senha do Admin</div>
    <div style="font-size:12px;color:#8E8E93;text-align:center;line-height:1.4">Digite a senha para liberar a importação de planilhas.</div>
    <input id="senhaInput" type="password" placeholder="Senha..." style="border:1.5px solid #D1D1D6;border-radius:10px;padding:12px;font-size:14px;text-align:center" onkeydown="if(event.key==='Enter')confirmarSenhaAdmin()"/>
    <div style="display:flex;gap:8px">
      <button onclick="fecharSenhaModal()" style="flex:1;padding:12px;border:none;border-radius:10px;background:#E5E5EA;color:#1C1C1E;font-size:13px;font-weight:800;cursor:pointer">Só conferir</button>
      <button onclick="confirmarSenhaAdmin()" style="flex:1;padding:12px;border:none;border-radius:10px;background:#1A3770;color:#fff;font-size:13px;font-weight:800;cursor:pointer">Entrar</button>
    </div>
    <div id="senhaErro" style="display:none;font-size:11px;color:#FF3B30;text-align:center;font-weight:700">Senha incorreta.</div>
  </div>
</div>

<script>
var dados = [];
var ME = '';
var isAdmin = false;

// ── Gerenciamento de usuário ──
function selecionarUsuario(nome){
  nome = (nome || '').trim();
  if(!nome){ alert('Digite um nome para continuar.'); return; }
  // Fecha o modal de nome
  var m = document.getElementById('nomeModal');
  if(m) m.style.display = 'none';

  if(nome === 'Cosme'){
    // Admin: pede senha antes de liberar
    var sm = document.getElementById('senhaModal');
    if(sm){ sm.style.display = 'flex'; setTimeout(function(){ var si=document.getElementById('senhaInput'); if(si)si.focus(); },100); }
    // Guarda o nome provisório para usar após confirmação da senha
    window._nomeAdmin = nome;
  } else {
    _aplicarUsuario(nome, false);
  }
}

function confirmarSenhaAdmin(){
  var inp = document.getElementById('senhaInput');
  var err = document.getElementById('senhaErro');
  var senha = inp ? inp.value : '';
  // Senha do admin — altere aqui se necessário
  if(senha === 'panutrir2024' || senha === 'admin'){
    if(err) err.style.display = 'none';
    var sm = document.getElementById('senhaModal');
    if(sm) sm.style.display = 'none';
    if(inp) inp.value = '';
    _aplicarUsuario(window._nomeAdmin || 'Cosme', true);
  } else {
    if(err) err.style.display = 'block';
  }
}

function fecharSenhaModal(){
  var sm = document.getElementById('senhaModal');
  if(sm) sm.style.display = 'none';
  var inp = document.getElementById('senhaInput');
  if(inp) inp.value = '';
  var err = document.getElementById('senhaErro');
  if(err) err.style.display = 'none';
  // Entra sem privilégios de admin
  _aplicarUsuario(window._nomeAdmin || 'Cosme', false);
}

function _aplicarUsuario(nome, admin){
  ME = nome;
  isAdmin = admin;
  try{ localStorage.setItem('estoquista_nome', nome); }catch(e){}
  try{ localStorage.setItem('is_admin', admin ? '1' : '0'); }catch(e){}
  var bn = document.getElementById('btnNome');
  if(bn) bn.textContent = (isAdmin ? '👑 ' : '👤 ') + ME;
  var bi = document.getElementById('btnImport');
  if(bi) bi.style.display = isAdmin ? 'inline-block' : 'none';
  render(); prog();
  setTimeout(function(){
    try{ iniciarSync(); }catch(e){}
    setSyncStatus(navigator.onLine ? 'idle' : 'offline');
    _iniciarPollDados();
  }, 500);
}

function mudarNome(){
  // Limpa nome salvo e mostra o modal novamente
  try{ localStorage.removeItem('estoquista_nome'); }catch(e){}
  try{ localStorage.removeItem('is_admin'); }catch(e){}
  ME = ''; isAdmin = false;
  var m = document.getElementById('nomeModal');
  if(m){ m.style.display = 'flex'; }
  var bi = document.getElementById('btnImport');
  if(bi) bi.style.display = 'none';
}

// ── Indicador visual de sincronização ──
function setSyncStatus(status){
  var dot = document.getElementById('syncDot');
  if(!dot) return;
  var cores = { idle:'#34C759', pushing:'#FF9500', pulling:'#007AFF', offline:'#8E8E93', error:'#FF3B30' };
  var titulos = { idle:'Sincronizado', pushing:'Enviando...', pulling:'Recebendo...', offline:'Sem conexão', error:'Erro de sincronização' };
  dot.style.background = cores[status] || '#8E8E93';
  dot.title = titulos[status] || status;
}

// Formato de data consistente ddmmyyyy — não depende de locale do browser
function _dataKey(d){ var dt=d||new Date(); return String(dt.getDate()).padStart(2,'0')+String(dt.getMonth()+1).padStart(2,'0')+dt.getFullYear(); }
var SK = 'conf_q_' + _dataKey();
var E = {};
try { E = JSON.parse(localStorage.getItem(SK) || '{}'); } catch(e) {}
var filtroAtual = '';
var modoSoma = false;
var somaSel = {};

// ═══════════════════════════════════════════════════════════════
// SINCRONIZAÇÃO PANTRY (cloud) — 2 estoquistas simultâneos
// ═══════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════
// FIREBASE REALTIME DATABASE — sincronização em tempo real
// ═══════════════════════════════════════════════════════════════
var FB_URL = 'https://validaquebra-default-rtdb.firebaseio.com';
var POLL_MS = 5000;
var PUSH_DEBOUNCE_MS = 1500;

// Chaves do dia
function _fbDadosURL(){ return FB_URL + '/dados_' + _dataKey() + '.json'; }
function _fbConfURL(){  return FB_URL + '/conf_'  + _dataKey() + '.json'; }

var pushTimer = null;
var pullTimer = null;
var _syncBusy = false;
var ultimaMudancaRemota = {};

// ── Envia conferências (E) para o Firebase ──
function cloudPush(){
  if(!navigator.onLine){ setSyncStatus('offline'); return; }
  if(_syncBusy){ cloudPushDebounced(); return; }
  _syncBusy = true;
  setSyncStatus('pushing');
  var guard = setTimeout(function(){ _syncBusy = false; setSyncStatus('error'); }, 15000);

  // Lê remoto, merge, escreve
  fetch(_fbConfURL())
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(remoto){
      if(remoto && typeof remoto === 'object'){
        for(var k in remoto){
          var rem = remoto[k], loc = E[k];
          if(!rem || typeof rem !== 'object') continue;
          if((rem.ts||0) > ((loc&&loc.ts)||0)){ E[k] = rem; ultimaMudancaRemota[k] = Date.now(); }
        }
      }
      return fetch(_fbConfURL(), {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(E)
      });
    })
    .then(function(r){
      if(!r.ok) throw new Error('HTTP ' + r.status);
      try{ localStorage.setItem(SK, JSON.stringify(E)); }catch(e){}
      render(); prog();
      clearTimeout(guard); _syncBusy = false; setSyncStatus('idle');
    })
    .catch(function(e){
      console.warn('[cloudPush]', e);
      clearTimeout(guard); _syncBusy = false; setSyncStatus('error');
    });
}

function cloudPushDebounced(){
  if(pushTimer) clearTimeout(pushTimer);
  pushTimer = setTimeout(cloudPush, PUSH_DEBOUNCE_MS);
}

function cloudPull(){
  if(!navigator.onLine){ setSyncStatus('offline'); return; }
  if(_syncBusy) return;
  _syncBusy = true;
  setSyncStatus('pulling');
  var guard = setTimeout(function(){ _syncBusy = false; setSyncStatus('error'); }, 15000);

  fetch(_fbConfURL())
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(remoto){
      if(remoto && typeof remoto === 'object'){
        var mudou = false;
        for(var k in remoto){
          var rem = remoto[k], loc = E[k];
          if(!rem || typeof rem !== 'object') continue;
          if((rem.ts||0) > ((loc&&loc.ts)||0)){
            E[k] = rem; ultimaMudancaRemota[k] = Date.now(); mudou = true;
          }
        }
        if(mudou){ try{ localStorage.setItem(SK, JSON.stringify(E)); }catch(e){} render(); prog(); }
      }
      clearTimeout(guard); _syncBusy = false; setSyncStatus('idle');
    })
    .catch(function(){ clearTimeout(guard); _syncBusy = false; setSyncStatus('error'); });
}

function iniciarSync(){
  cloudPush();
  if(pullTimer) clearInterval(pullTimer);
  pullTimer = setInterval(cloudPush, POLL_MS);
}

function forcarSync(){ cloudPush(); }

// ── Envia lista de quebras (planilha) para o Firebase ──
function pushDados(tentativa){
  tentativa = tentativa || 1;
  if(!navigator.onLine || !dados || dados.length === 0) return;
  console.log('[pushDados] tentativa', tentativa, '| itens:', dados.length);

  fetch(_fbDadosURL(), {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({dados: dados, ts: Date.now()})
  })
  .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(function(){
    console.log('[pushDados] OK');
    setSyncStatus('idle');
    alert('✅ Planilha enviada para a nuvem!\n' + dados.length + ' quebras disponíveis para outros usuários.');
  })
  .catch(function(e){
    console.warn('[pushDados] erro tentativa', tentativa, e);
    if(tentativa < 4){
      setTimeout(function(){ pushDados(tentativa+1); }, tentativa * 2000);
    } else {
      alert('⚠️ Não foi possível enviar a planilha. Verifique a conexão e tente reimportar.');
      setSyncStatus('error');
    }
  });
}

// ── Poll dedicado: Anderson recebe dados assim que Cosme importar ──
var _pollDadosTimer = null;
function _iniciarPollDados(){
  if(_pollDadosTimer) clearInterval(_pollDadosTimer);
  if(dados.length > 0) return;
  _pollDadosTimer = setInterval(function(){
    if(dados.length > 0){ clearInterval(_pollDadosTimer); _pollDadosTimer = null; return; }
    fetch(_fbDadosURL())
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(d){
        if(d && d.dados && Array.isArray(d.dados) && d.dados.length > 0){
          dados = d.dados.map(function(it){
            return Object.assign({},it,{_val:it._val?Number(it._val):Infinity});
          });
          clearInterval(_pollDadosTimer); _pollDadosTimer = null;
          render(); prog();
          console.log('[pollDados] recebidos:', dados.length, 'itens');
        }
      })
      .catch(function(){});
  }, 4000);
}

// ── iniciarConferencia: nunca bloqueia, busca Firebase em background ──
function iniciarConferencia(){
  // Mostra app imediatamente
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  render(); prog();
  // Sync começa após 500ms para não bloquear render inicial
  setTimeout(function(){
    try{ iniciarSync(); }catch(e){}
    setSyncStatus(navigator.onLine ? 'idle' : 'offline');
    _iniciarPollDados();
    // Busca dados do Firebase em background
    if(!navigator.onLine) return;
    Promise.all([
      fetch(_fbDadosURL()).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; }),
      fetch(_fbConfURL()).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; })
    ]).then(function(res){
      var remDados = res[0], remConf = res[1], mudou = false;
      if(remDados && remDados.dados && Array.isArray(remDados.dados) && remDados.dados.length > 0){
        dados = remDados.dados.map(function(it){
          return Object.assign({},it,{_val:it._val?Number(it._val):Infinity});
        });
        mudou = true;
      }
      if(remConf && typeof remConf === 'object'){
        for(var k in remConf){
          var rem = remConf[k], loc = E[k];
          if(!rem || typeof rem !== 'object') continue;
          if((rem.ts||0) > ((loc&&loc.ts)||0)){ E[k] = rem; mudou = true; }
        }
        try{ localStorage.setItem(SK, JSON.stringify(E)); }catch(e){}
      }
      if(mudou){ render(); prog(); }
    }).catch(function(e){ console.warn('[iniciarConferencia bg]', e); });
  }, 500);
}

function sc(d) {
  try {
    var p=d.split('/'),dd=+p[0],mm=+p[1],aa=+p[2];
    var df=Math.floor((new Date(aa,mm-1,dd)-new Date())/86400000);
    if(df<0)  return{bg:'#1C1C1E',tx:'#fff',lb:'VENCIDO'};
    if(df<10) return{bg:'#8B4513',tx:'#fff',lb:'PRAZO LIM.'};
    if(df<=19)return{bg:'#FF3B30',tx:'#fff',lb:'URGENTE'};
    if(df<=21)return{bg:'#FF9500',tx:'#fff',lb:'CRÍTICO'};
    if(df<=23)return{bg:'#FFCC00',tx:'#2D1F00',lb:'ATENÇÃO'};
    return    {bg:'#E5E5EA',tx:'#1C1C1E',lb:'NORMAL'};
  }catch(e){return{bg:'#E5E5EA',tx:'#1C1C1E',lb:''};}
}

function salvar(key,campo,v){
  if(!E[key])E[key]={};
  E[key][campo]=v;
  E[key].ts=Date.now();
  E[key].by=ME||'?';
  try{localStorage.setItem(SK,JSON.stringify(E));}catch(e){}
  prog();
  cloudPushDebounced();
}

function setSt(i,st){
  var item = dados[i];
  if(!item) return;
  var key = item.k;
  var est = E[key] || {};
  var stAtual = est.status || '';

  // Se já está marcado e o usuário está mudando para outro status, pedir confirmação
  if (stAtual && stAtual !== st) {
    var labels = { pres: 'PRESENTE', ause: 'AUSENTE', corr: 'CORRIGIDA' };
    var labelAtual = labels[stAtual] || stAtual;
    var labelNovo  = labels[st] || st;
    var msg;
    if (est.by && est.by !== ME) {
      // Outro estoquista marcou
      var tempoAtras = est.ts ? tempoRelativo(est.ts) : 'pouco tempo';
      msg = 'Esse item foi marcado como ' + labelAtual + '\npor ' + est.by + ' (há ' + tempoAtras + ').\n\nDeseja alterar para ' + labelNovo + '?';
    } else {
      // Eu mesmo marquei
      msg = 'Esse item já consta como ' + labelAtual + '.\n\nDeseja alterar para ' + labelNovo + '?';
    }
    if (!confirm(msg)) {
      return; // cancelou — não muda nada
    }
  }

  salvar(key,'status',st);
  ['pres','ause','corr'].forEach(function(s,j){
    var b=document.getElementById('b'+j+'_'+i);
    if(b){if(s===st)b.classList.add('on');else b.classList.remove('on');}
  });
  var ow=document.getElementById('ow_'+i);
  if(ow)ow.style.display=(st==='corr')?'block':'none';
}

// Devolve "5 min", "2 h", "3 dias" — texto curto para o alerta
function tempoRelativo(ts){
  var s = Math.floor((Date.now() - ts) / 1000);
  if(s < 60)   return s + ' s';
  var m = Math.floor(s / 60);
  if(m < 60)   return m + ' min';
  var h = Math.floor(m / 60);
  if(h < 24)   return h + ' h';
  var d = Math.floor(h / 24);
  return d + ' dia' + (d > 1 ? 's' : '');
}

function prog(){
  var m=0;
  for(var k in E){if(E[k]&&E[k].status)m++;}
  var t=dados.length;

  if(el)el.textContent=m+'/'+t+' conferidos';
  var pb=document.getElementById('pbar');
  if(pb)pb.style.width=(t?(m/t*100):0)+'%';
}

// Cor estável e suave por SKU: mesmo SKU sempre gera a mesma cor (HSL com matiz por hash).
var _corSkuCache={};
function corDoSku(cod){
  var key=String(cod||'0');
  if(_corSkuCache[key])return _corSkuCache[key];
  // Hash simples e determinístico
  var h=0;
  for(var x=0;x<key.length;x++){h=((h<<5)-h)+key.charCodeAt(x);h|=0;}
  // Espalhar matiz em 360º. Multiplica por número primo para reduzir clusters quando codes são sequenciais
  var hue=Math.abs(h*47)%360;
  // Light: fundo bem suave (pastel, alta luminosidade, baixa saturação)
  // Dark:  versão saturada da mesma matiz para o separador e a barra lateral
  var light='hsl('+hue+',62%,93%)';
  var dark ='hsl('+hue+',45%,38%)';
  var res={light:light,dark:dark,hue:hue};
  _corSkuCache[key]=res;
  return res;
}

// Listeners delegados (instalados uma só vez)
function initListeners(){
  var cont=document.getElementById('cards');
  if(cont){
    cont.addEventListener('click',function(e){
      if(modoSoma){
        var card=e.target.closest('.card[data-cidx]');
        if(card){
          var ci=parseInt(card.getAttribute('data-cidx'));
          if(somaSel[ci]){delete somaSel[ci];card.classList.remove('selecionado');}
          else{somaSel[ci]=true;card.classList.add('selecionado');}
          atualizarBtnSoma();
          e.preventDefault();
          return;
        }
      }
      var b=e.target.closest('[data-st]');
      if(b)setSt(parseInt(b.getAttribute('data-idx')),b.getAttribute('data-st'));
    });
    cont.addEventListener('input',function(e){
      var inp=e.target.closest('input.obs-inp');
      if(inp){
        var idx=parseInt(inp.getAttribute('data-idx'));
        var item=dados[idx];
        if(item)salvar(item.k,'obs',inp.value);
      }
    });
  }
  var si=document.getElementById('srch');
  if(si){
    si.addEventListener('input',function(){
      filtroAtual=si.value;
      render();
    });
  }
}

function gerarPDF(){
  if(!window.jspdf){alert('Aguarde o carregamento do PDF.');return;}
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  var pgW=doc.internal.pageSize.getWidth();
  var pgH=doc.internal.pageSize.getHeight();
  var hoje=new Date().toLocaleDateString('pt-BR');
  var np=0,na=0,nc=0;
  for(var k in E){if(!E[k])continue;if(E[k].status==='pres')np++;else if(E[k].status==='ause')na++;else if(E[k].status==='corr')nc++;}
  var nn=dados.length-np-na-nc;

  // FILTRO: gera PDF APENAS com etiquetas AUSENTES e CORRIGIDAS (com observação)
  var dadosFiltrados=[];
  for(var idx=0; idx<dados.length; idx++){
    var estF=E[dados[idx].k]||{};
    if(estF.status==='ause' || estF.status==='corr'){
      dadosFiltrados.push({item:dados[idx], idx:idx, est:estF});
    }
  }
  if(dadosFiltrados.length===0){
    alert('Nenhuma etiqueta marcada como AUSENTE ou CORRIGIDA. Faça a conferência antes de gerar o PDF.');
    return;
  }

  doc.setFillColor(88,86,214);doc.rect(0,0,pgW,1.5,'F');
  doc.setFillColor(250,250,253);doc.rect(0,1.5,pgW,28,'F');
  doc.setDrawColor(235,235,242);doc.setLineWidth(0.3);doc.line(0,29.5,pgW,29.5);
  doc.setFont('helvetica','bold');doc.setFontSize(17);doc.setTextColor(28,28,30);
  doc.text('Quebras: Ausentes & Correções',10,14);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(108,108,112);
  doc.text('Apenas etiquetas ausentes e observações de correção — CD Matriz Panutrir',10,20);
  doc.text('Gerado em: '+hoje,10,26);

  var kpiY=33,kpiH=16,kpiW=(pgW-20)/4;
  var kpis=[
    {lb:'AUSENTE',vl:na,c:[255,59,48]},
    {lb:'CORRIGIDA',vl:nc,c:[255,149,0]},
    {lb:'PRESENTE',vl:np,c:[52,199,89]},
    {lb:'N. CONFERIDO',vl:nn,c:[108,108,112]}
  ];
  kpis.forEach(function(ki,j){
    var x=10+j*kpiW;
    doc.setFillColor(242,242,247);doc.roundedRect(x,kpiY,kpiW-3,kpiH,2,2,'F');
    doc.setFillColor(ki.c[0],ki.c[1],ki.c[2]);doc.rect(x,kpiY,2,kpiH,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(28,28,30);

    doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(150,150,160);

    var stInfo=est.status&&stMap[est.status]?stMap[est.status]:{lb:'—',c:[200,200,200]};

    doc.setFillColor(stInfo.c[0],stInfo.c[1],stInfo.c[2]);doc.rect(xC,y,2.5,8,'F');

    var cx3=xC+3;
    // ETIQUETA + BADGE STATUS lado a lado (largura total da coluna: 46mm)
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(26,55,112);
    doc.text(item.etiqueta,cx3+1,y+5);

    doc.setFont('helvetica','bold');doc.setFontSize(6);doc.setTextColor(255,255,255);
    doc.text(stInfo.lb,stBadgeX+11,y+4.8,{align:'center'});
    cx3+=43;

    var nomeT=item.nome.length>40?item.nome.substring(0,39)+'…':item.nome;
    doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(28,28,30);
    doc.text(nomeT,cx3+2,y+5);cx3+=68;

    var sp=function(dataStr){
      try{var p=dataStr.split('/'),df=Math.floor((new Date(+p[2],+p[1]-1,+p[0])-new Date())/86400000);
        if(df<0)  return{bg:[28,28,30],tx:[255,255,255],lb:'VENCIDO'};
        if(df<10) return{bg:[139,69,19],tx:[255,255,255],lb:'PRAZO LIM.'};
        if(df<=19)return{bg:[255,59,48],tx:[255,255,255],lb:'URGENTE'};
        if(df<=21)return{bg:[255,149,0],tx:[255,255,255],lb:'CRITICO'};
        if(df<=23)return{bg:[255,204,0],tx:[45,31,0],lb:'ATENCAO'};
        return    {bg:[229,229,234],tx:[28,28,30],lb:'NORMAL'};}
      catch(e){return{bg:[229,229,234],tx:[28,28,30],lb:''};} };
    var sp2=sp(item.data);
    doc.setFillColor(sp2.bg[0],sp2.bg[1],sp2.bg[2]);doc.roundedRect(cx3+1,y+1.5,24,5,1,1,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(5.5);doc.setTextColor(sp2.tx[0],sp2.tx[1],sp2.tx[2]);
    doc.text(item.data,cx3+13,y+4.2,{align:'center'});cx3+=26;

    doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(28,28,30);
    doc.text(String(item.cx),cx3+12/2,y+5,{align:'center'});cx3+=12;
    doc.text(String(item.unds),cx3+14/2,y+5,{align:'center'});cx3+=14;
    doc.text(String(item.total),cx3+16/2,y+5,{align:'center'});cx3+=16;

    if(item.obs){
      doc.setFont('helvetica','bold');doc.setFontSize(5);doc.setTextColor(160,100,0);
      doc.text('FANTASMA?',xC+pgW-26,y+5);
    }
    if(est.obs){
      y+=8;
      if(y+5>maxY){drawFoot2();doc.addPage();pageNum++;y=14;}
      doc.setFillColor(255,249,235);doc.rect(xC,y,pgW-18,5,'F');
      doc.setFont('helvetica','italic');doc.setFontSize(6);doc.setTextColor(130,80,0);
      var obsT=('OBS: '+est.obs);if(obsT.length>90)obsT=obsT.substring(0,89)+'…';
      doc.text(obsT,xC+4,y+3.5);
      y+=5;
    } else { y+=8; }

    doc.setDrawColor(242,242,247);doc.setLineWidth(0.2);doc.line(xC,y,xC+pgW-18,y);
  });

  drawFoot2();
  var dt=new Date().toISOString().slice(0,10).replace(/-/g,'');
  doc.save('Quebras_Ausentes_Correcoes_'+dt+'.pdf');
}

// ─── iniciarConferencia ──────────────────────────────────────────
// Chamada após o usuário ser identificado. Tenta buscar dados da nuvem;
// se houver dados, mostra o app direto. Se não houver (cesta vazia ou
// sem planilha importada), mostra o app com mensagem de "nenhuma quebra".
// Se o usuário for Admin (Cosme), mostra também o botão de importar.
// ─── BOOT ───────────────────────────────────────────────────────
// Sempre começa pedindo quem é o usuário. Se já houver nome salvo de antes,
// re-aplica a permissão automaticamente (sem precisar escolher de novo).
(function bootInicial(){
  // Abre o app imediatamente — sem spinner, sem esperar rede
  var sp = document.getElementById('splash');
  if(sp) sp.style.display = 'none';
  var ap = document.getElementById('app');
  if(ap) ap.style.display = 'block';

  var nomeSalvo = '';
  try { nomeSalvo = localStorage.getItem('estoquista_nome') || ''; } catch(e){}
  var adminSalvo = false;
  try { adminSalvo = localStorage.getItem('is_admin') === '1'; } catch(e){}

  if(nomeSalvo){
    isAdmin = adminSalvo;
    ME = nomeSalvo;
    var bn = document.getElementById('btnNome');
    if(bn) bn.textContent = (isAdmin ? '👑 ' : '👤 ') + ME;
    var bi = document.getElementById('btnImport');
    if(bi) bi.style.display = isAdmin ? 'inline-block' : 'none';
    render(); prog();
    // Sync em background após 500ms
    setTimeout(function(){
      try{ iniciarSync(); }catch(e){}
      setSyncStatus(navigator.onLine ? 'idle' : 'offline');
      _iniciarPollDados();
    }, 500);
  } else {
    // Sem nome: mostra modal por cima do app vazio
    render(); prog();
    var m = document.getElementById('nomeModal');
    if(m) m.style.display = 'flex';
  }
})();

var lastroSkuDB = {
  "669":228,"162272":228,"162775":228,"85841":190,"162800":228,
  "162802":136,"85181":152,"162767":190,"162801":228,"135231":190,
  "6":190,"81581":285,"11":285,"81591":285,"81571":228,
  "655":228,"16":285,"1224":228,"135241":228,"2":228,
  "81661":228,"135211":136,"162275":170,"162923":170,"162920":170,
  "162921":170,"162922":170,"82051":136,"135221":152,
  "69251":152,"162276":190,"86151":190,"5":228,"121811":190,
  "121821":285,"121861":228,"121801":136,"121581":152,"121871":128,
  "162358":190,"162396":171,"145521":171,"121831":152,"145511":171,
  "121841":152,"162783":171,"162784":171,"141951":380,"141441":380,
  "2279":190
};
function _nText(v){return String(v==null?'':v).normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().toUpperCase();}
function _nKey(v){return _nText(v).replace(/[^A-Z0-9]+/g,'_').replace(/^_+|_+$/g,'');}
function _pNum(v){if(typeof v==='number')return v;var s=String(v==null?'':v).trim().replace(/\s/g,'');if(s.indexOf('.')>=0&&s.indexOf(',')>=0)s=s.replace(/\./g,'').replace(',','.');else s=s.replace(',','.');return isNaN(Number(s))?0:Number(s);}
function _pDate(v){if(!v&&v!==0)return null;if(v instanceof Date&&!isNaN(v)){var d=new Date(v);d.setHours(0,0,0,0);return d;}if(typeof v==='number')return new Date(Math.floor(v-25569)*86400*1000);var s=String(v).trim();if(s.indexOf('/')>=0){var p=s.split('/');if(p.length===3)return new Date(Number(p[2]),Number(p[1])-1,Number(p[0]));}return null;}
function _gField(row,al){for(var i=0;i<al.length;i++){var a=al[i];if(row[a]!==undefined&&row[a]!==null&&String(row[a]).trim()!=='')return row[a];}return '';}
function _gLastro(cod,name){var s=String(cod).trim();if(lastroSkuDB[s])return lastroSkuDB[s];return _nText(name).indexOf('HAMBURGUER GOURMET')>=0?136:190;}

function processarArquivo(file){
  if(!file)return;
  if(typeof XLSX==='undefined'){alert('Biblioteca de planilha ainda carregando. Aguarde e tente de novo.');return;}
  // splash já está oculto, nada a fazer aqui
  var reader=new FileReader();
  reader.onload=function(evt){
    try{
      var wb=XLSX.read(new Uint8Array(evt.target.result),{type:'array',cellDates:true});
      var rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      montarQuebras(rows,file.name);
    }catch(e){alert('Erro ao ler planilha: '+e.message);}
  };
  reader.readAsArrayBuffer(file);
}

function montarQuebras(rows,fileName){
  var today=new Date();today.setHours(0,0,0,0);
  var listaQ=[];
  rows.forEach(function(row){
    var n={};Object.keys(row||{}).forEach(function(k){n[_nKey(k)]=row[k];});
    var cod=String(_gField(n,['COD','CODIGO','SKU'])).trim().replace(/\.0+$/,'').replace(/\s/g,'');
    var produto=String(_gField(n,['PRODUTO','DESCRICAO','ITEM'])).trim();
    var qtd=Math.round(_pNum(_gField(n,['QTD_TOTAL','QTD','ESTOQUE'])));
    var validade=_pDate(_gField(n,['VALIDADE','DT_VALIDADE']));
    var etiqueta=String(_gField(n,['ETIQUETA'])).trim();
    if(!produto||!validade||!qtd)return;
    var lastro=_gLastro(cod,produto);
    if(qtd>=lastro)return; // só quebras
    var diff=Math.ceil((validade-today)/86400000);
    listaQ.push({cod:cod,produto:produto,qtd:qtd,validade:validade,lastro:lastro,etiqueta:etiqueta,diff:diff});
  });
  if(listaQ.length===0){alert('A planilha foi lida, mas nenhuma quebra (qtd < lastro) foi encontrada.\nVerifique as colunas: COD, PRODUTO, QTD_TOTAL, VALIDADE, ETIQUETA.');return;}

  var minDiff=Math.min.apply(null,listaQ.map(function(i){return i.diff;}));
  var _ordem=[81571,81591,162396,16,81581,11,145521,145511,655,1224,6,69251,82051,2,81661,85841,162800,162767,85181,162802,135231,135221,135211,162275,135241,162276,162923,162920,162921,162922,121801,121581,121811,121831,121821,121861,121871,162358,121841,162783,162784,669,162775,162272,141951,141441];
  // Monta os "dados" no MESMO formato do popup (com key estável k)
  dados=listaQ.map(function(i){
    var div=i.produto.toUpperCase().indexOf('HAMBURGUER')>=0?17:19;
    var upCx=i.lastro/div;
    var etq=String(i.etiqueta||i.cod||'-');
    var valStr=i.validade?i.validade.toISOString().slice(0,10):'0';
    var k=(etq+'|'+i.cod+'|'+valStr+'|'+Math.round(i.qtd)).replace(/\s+/g,'_');
    return {
      k:k, etiqueta:etq, _cod:i.cod,
      _val:i.validade?i.validade.getTime():Infinity,
      data:i.validade?i.validade.toLocaleDateString('pt-BR'):'-',
      nome:i.produto,
      cx:Math.floor(i.qtd/upCx), unds:Math.round(i.qtd%upCx), total:Math.round(i.qtd),
      upCx:upCx,
      obs:(i.qtd<30&&i.diff===minDiff)?'FANTASMA?':''
    };
  }).sort(function(a,b){
    var ia=_ordem.indexOf(Number(a._cod)),ib=_ordem.indexOf(Number(b._cod));
    var pA=ia===-1?Infinity:ia,pB=ib===-1?Infinity:ib;
    if(pA!==pB)return pA-pB;
    if(a._cod!==b._cod)return String(a._cod).localeCompare(String(b._cod));
    return a._val-b._val;
  });

  // App já está visível — só renderiza e envia para o Firebase
  render();
  setSyncStatus(navigator.onLine?'idle':'offline');
  pushDados();
  setTimeout(pushDados, 3000);
}

function reimportar(){
  var fi=document.getElementById('fileInputGlobal');
  if(fi){fi.value='';fi.click();}
}
